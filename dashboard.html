<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>لوحة مشاريع بصر</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="section">

<div class="container">

<div class="section-head">

<h2>لوحة تحديث المشاريع</h2>

<p class="muted">
هنا يمكن لأعضاء بصر إضافة تحديثات مشاريعهم
</p>

</div>


<div class="grid-2">


<div class="card">

<h3>إضافة تحديث</h3>

<label>الاسم</label>

<input id="name" type="text" placeholder="اكتب اسمك"
style="width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin:10px 0;">

<label>اسم المشروع</label>

<input id="project" type="text" placeholder="اكتب اسم المشروع"
style="width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin:10px 0;">

<label>تحديث المشروع</label>

<textarea id="update" rows="6" placeholder="اكتب التحديث هنا"
style="width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin:10px 0;font-family:'Cairo',sans-serif;"></textarea>

<button class="btn" style="width:100%;" onclick="sendUpdate()">
حفظ التحديث
</button>

<p id="status" class="muted" style="margin-top:10px;"></p>

</div>


<div class="card">

<h3>آخر التحديثات</h3>

<button class="btn btn-outline" style="width:100%;margin-bottom:10px;" onclick="loadUpdates()">
تحديث القائمة
</button>

<ul id="list" style="padding-right:20px;"></ul>

</div>


</div>

</div>

</section>


<script>

/* حماية الصفحة */

if(localStorage.getItem("basar_logged")!=="yes"){

window.location.href="login.html";

}


/* رابط SheetDB */

const API_URL="https://sheetdb.io/api/v1/yif5p1hj2cn27";


async function sendUpdate(){

const name=document.getElementById("name").value.trim();
const project=document.getElementById("project").value.trim();
const update=document.getElementById("update").value.trim();
const status=document.getElementById("status");

if(!name||!project||!update){

status.innerText="رجاءً عبّئ كل الحقول";

return;

}

status.innerText="جاري الحفظ...";


const data={
data:[
{
name:name,
project:project,
update:update,
date:new Date().toLocaleDateString()
}
]
};


await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

status.innerText="تم حفظ التحديث ✅";

document.getElementById("update").value="";

loadUpdates();

}



async function loadUpdates(){

const list=document.getElementById("list");

list.innerHTML="جاري التحميل...";


const response=await fetch(API_URL);

const data=await response.json();


list.innerHTML="";


data.reverse().slice(0,10).forEach(item=>{

const li=document.createElement("li");

li.innerText=item.name+" - "+item.project+" : "+item.update;

list.appendChild(li);

});

}


loadUpdates();

</script>

</body>
</html>
