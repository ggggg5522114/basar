<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>دخول الأعضاء | بصر</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<header class="site-header">
  <nav class="nav container">
    <a href="index.html" class="logo">بصر</a>
    <button id="menuBtn" class="menu-btn" type="button"><i class="fa-solid fa-bars"></i></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">العودة للموقع</a></li>
    </ul>
  </nav>
</header>

<section class="section login-section">
  <div class="container">
    <div class="section-head reveal">
      <span class="section-label">بوابة الأعضاء</span>
      <h2>تسجيل دخول أعضاء بصر</h2>
      <p class="muted">الرجاء إدخال كلمة المرور الخاصة بالأعضاء</p>
    </div>

    <div class="card login-card reveal">
      <label for="pass">كلمة المرور</label>

      <div class="password-wrap">
        <input id="pass" type="password" placeholder="اكتب كلمة المرور" />
        <button type="button" class="toggle-pass" onclick="togglePassword()">إظهار</button>
      </div>

      <button class="btn full-btn" type="button" onclick="login()">تسجيل الدخول</button>
      <p id="msg" class="login-msg muted"></p>

      <div class="divider"></div>
      <p class="muted">هذه صفحة داخلية لأعضاء بصر لمتابعة التحديثات والمشاريع.</p>
    </div>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
<script src="script.js"></script>
</body>
</html>
