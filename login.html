<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>تسجيل دخول أعضاء بصر</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<section class="section">
  <div class="container">

    <div class="section-head">
      <h2>تسجيل دخول أعضاء بصر</h2>
      <p class="muted">الرجاء إدخال كلمة المرور الخاصة بالأعضاء</p>
    </div>

    <div class="card" style="max-width:520px;margin:0 auto;">

      <label>كلمة المرور</label>
      <input
        id="pass"
        type="password"
        placeholder="اكتب كلمة المرور"
        style="width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin:10px 0;font-family:'Cairo',sans-serif;"
      />

      <button class="btn" style="width:100%;" onclick="login()">تسجيل الدخول</button>

      <p id="msg" class="muted" style="margin-top:12px;"></p>

      <div class="divider"></div>

      <a href="index.html" class="to-top" style="display:inline-block;color:#1a2a6c;text-decoration:none;font-weight:bold;">
        العودة للصفحة الرئيسية
      </a>

    </div>

  </div>
</section>

<script>
function login(){
  const pass = document.getElementById("pass").value.trim();
  const msg = document.getElementById("msg");

  // ✅ غيّر كلمة المرور هنا لما تريد
  const MEMBER_PASSWORD = "BASAR123";

  if(pass === MEMBER_PASSWORD){
    localStorage.setItem("basar_logged","yes");
    window.location.href = "dashboard.html";
  } else {
    msg.textContent = "بيانات الدخول غير صحيحة";
  }
}
</script>

</body>
</html>
